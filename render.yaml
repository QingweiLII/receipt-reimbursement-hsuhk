services:
  - type: web
    name: hsuhk-receipt-report-page
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: LLM_PROVIDER
        value: minimax
      - key: LLM_BASE_URL
        value: https://api.minimaxi.com/anthropic
      - key: LLM_MODEL
        value: MiniMax-M2.7
      - key: LLM_MAX_TOKENS
        value: 2500
      - key: LLM_TIMEOUT_SECONDS
        value: 45
      - key: OCR_FALLBACK_ON_LLM_ERROR
        value: true
      - key: RECEIPT_PROCESS_TIMEOUT_SECONDS
        value: 120
      - key: EXCHANGE_RATE_PROVIDER
        value: frankfurter
      - key: FX_BASE_URL
        value: https://api.frankfurter.dev/v2
      - key: FX_LOOKBACK_DAYS
        value: 7
      - key: OCR_TARGET_MIN_EDGE
        value: 900
      - key: OCR_MAX_LONG_EDGE
        value: 2000
      - key: OCR_PSMS
        value: 6
      - key: OCR_TIMEOUT_SECONDS
        value: 20
      - key: OCR_MAX_CANDIDATES
        value: 2
      - key: STORAGE_PROVIDER
        value: user_google_drive
      - key: GOOGLE_DRIVE_FOLDER_NAME
        value: HSUHK Receipt Reports
      - key: MAX_UPLOAD_MB
        value: 20
      - key: MAX_PARALLEL_RECEIPTS
        value: 2
      - key: UPLOAD_JOB_WORKERS
        value: 1
      - key: MAX_ACTIVE_UPLOAD_JOBS
        value: 4
      - key: MAX_FILES_PER_UPLOAD
        value: 10
      - key: LLM_API_KEY
        sync: false
